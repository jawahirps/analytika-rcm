name: Release

# Automatic updates pipeline: every push to main (and every v* tag) builds a
# versioned Docker image and publishes it to GHCR. If a RENDER_DEPLOY_HOOK_URL
# (or RAILWAY_REDEPLOY_HOOK_URL) secret is configured, the new image is rolled
# out to the pod automatically.

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ vars.RENDER_DEPLOY_ENABLED == 'true' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Railway redeploy hook
        if: ${{ vars.RAILWAY_DEPLOY_ENABLED == 'true' }}
        run: curl -fsS -X POST "${{ secrets.RAILWAY_REDEPLOY_HOOK_URL }}"

      - name: No deploy hooks configured
        if: ${{ vars.RENDER_DEPLOY_ENABLED != 'true' && vars.RAILWAY_DEPLOY_ENABLED != 'true' }}
        run: echo "Image published to GHCR. Set RENDER_DEPLOY_ENABLED / RAILWAY_DEPLOY_ENABLED repo variables (+ hook URL secrets) to enable automatic rollout."
