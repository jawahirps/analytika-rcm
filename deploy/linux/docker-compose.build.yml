# Override to BUILD the app image locally instead of pulling it from GHCR.
# Use when testing an unmerged branch on the host:
#
#   git fetch origin <branch> && git checkout <branch>
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build app
#
# For normal operation (auto-deploy from GHCR) just use docker-compose.yml alone.
services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ghcr.io/jawahirps/analytika-rcm:latest
