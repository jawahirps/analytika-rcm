# ─────────────────────────────────────────────────────────────────────────────
# Analytika RCM — LOCAL hosting on your own machine (no Cloudflare, no build).
# Pulls the prebuilt image from GHCR and serves on http://localhost:8080.
#
#   docker compose up -d            # pull + run
#   open http://localhost:8080      # login page
#   docker compose logs -f app      # watch startup
#   docker compose down             # stop (data is kept in ./data)
#
# Data: starts EMPTY. To use your production data, copy bix's
# deploy/linux/data/analytika.db into ./data/ here BEFORE first start, and leave
# the three StartupMaintenance__* flags = false.
# Fresh start instead: set RunDatabaseSetupOnStartup=true for the first boot
# only (creates the schema), then set it back to false and `docker compose up -d`.
# ─────────────────────────────────────────────────────────────────────────────
services:
  app:
    image: ghcr.io/jawahirps/analytika-rcm:latest
    container_name: analytika-local
    restart: unless-stopped
    ports:
      - "8080:8080"          # http://localhost:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      DB_DIR: /app/data
      # First boot on a FRESH db only: flip to "true" once, then back to "false".
      StartupMaintenance__RunDatabaseSetupOnStartup: "false"
      StartupMaintenance__CreateIndexesOnStartup: "false"
      StartupMaintenance__SeedDataOnStartup: "false"
      # Background jobs OFF by default for a local box (no nightly portal sync).
      # Flip to "true" if you want the local instance to fetch on its own.
      BackgroundJobs__HangfireServerEnabled: "false"
      BackgroundJobs__HangfireDashboardEnabled: "false"
      BackgroundJobs__RecurringJobsEnabled: "false"
      BackgroundJobs__PendingDownloads__HostedServiceEnabled: "false"
    volumes:
      - ./data:/app/data
      - ./portal-downloads:/app/wwwroot/portal-downloads
      - ./reports:/app/wwwroot/reports
