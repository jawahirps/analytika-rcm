services:
  - type: web
    name: analytika-rcm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # free plan does not support persistent disks
    region: singapore      # closest to UAE
    branch: main
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DB_DIR
        value: /app/data
    disk:
      name: analytika-data
      mountPath: /app/data
      sizeGB: 5            # 5 GB gives headroom for the 2 GB DB + downloads
